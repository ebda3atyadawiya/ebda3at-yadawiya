backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "الإصدارات"
    folder: "_posts"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - {label: "العنوان", name: "title", widget: "string"}
      - {label: "الوصف", name: "description", widget: "text"}
      - {label: "الصورة", name: "image", widget: "image"}
      - {label: "(اختياري) رابط الفيديو", name: "video", widget: "string", required: false}
      - {label: "التاريخ", name: "date", widget: "datetime"}