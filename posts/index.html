<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>ساعة رملية - إبداعات يدوية</title>
  <style>
    body { font-family: 'Tajawal', sans-serif; background: #f9fafc; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; }
    h1 { color: #1e40af; text-align: center; }
    img, video { width: 100%; height: auto; border-radius: 8px; margin: 15px 0; }
    .youtube-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      margin: 20px 0;
    }
    .youtube-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>ساعة رملية</h1>
    
    <!-- الصورة -->
    <img src="../images/sand-clock.jpg" alt="ساعة رملية">

    <!-- الفيديو المحلي -->
    <video controls>
      <source src="../videos/sand-clock.mp4" type="video/mp4">
    </video>

    <!-- فيديو يوتيوب -->
    <div class="youtube-container">
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
    </div>

    <!-- النص والروابط -->
    <p>
      هذه الساعة الرملية مصنوعة يدويًّا...
    </p>
    <p>
      شاهد الفيديو الكامل على 
      <a href="https://youtube.com/@ebda3at.yadawiya" target="_blank">قناتنا على يوتيوب</a>.
    </p>
    <p>
      اكتشف أيضًا: <a href="mizharia.html">مزهرية خزفية</a>
    </p>
  </div>
</body>
</html>
