<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>صناعة ساعة رملية بنفسك- إبداعات يدوية</title>
  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background: #f9fafc;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    h1 {
      color: #1e40af;
      text-align: center;
      margin-bottom: 20px;
    }
    img, video {
      width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 15px 0;
    }
    .youtube-container {
      position: relative;
      padding-bottom: 56.25%; /* نسبة 16:9 */
      height: 0;
      margin: 20px 0;
      border-radius: 8px;
      overflow: hidden;
    }
    .youtube-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    p {
      line-height: 1.7;
      color: #333;
    }
    .social-links {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    .social-links h3 {
      color: #1e40af;
      margin-bottom: 12px;
    }
    .social-links a {
      display: block;
      color: #2563eb;
      text-decoration: none;
      margin: 6px 0;
      font-weight: 600;
    }
    .social-links a:hover {
      text-decoration: underline;
    }
    .back {
      display: inline-block;
      margin-top: 20px;
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
    .back:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>صناعة ساعة رملية بنفسك</h1>

    <!-- الصورة -->
    <img src="../images/sa3a-ramliya.jpg" alt="صناعة ساعة رملية بنفسك">

    <!-- الفيديو المحلي (MP4) -->
    <video controls poster="../images/sa3a-ramliya.jpg">
      <source src="../videos/sa3a.ramliya.mp4" type="video/mp4">
      متصفحك لا يدعم تشغيل الفيديو.
    </video>

    <!-- فيديو يوتيوب مضمن -->
    <h2>شاهد الفيديو على يوتيوب</h2>
    <div class="youtube-container">
      <iframe 
        src="https://www.youtube.com/embed/@ebda3at.yadawiya" 
        allowfullscreen>
      </iframe>
    </div>

    <!-- النص -->
    <p>
شارك معنا إبداعك اليدوي
    </p>
    <p>
من أشياء بسيطة نصنع أشياء مفيدة و رائعة و غير مكلفة
    </p>

    <!-- روابط التواصل -->
    <div class="social-links">
      <h3>تابعنا على وسائل التواصل</h3>
      <a href="https://www.facebook.com/Ebda3at.Yadawiya" target="_blank">فيسبوك</a>
      <a href="https://youtube.com/@ebda3at.yadawiya" target="_blank">يوتيوب</a>
      <a href="https://instagram.com/ebda3at.yadawiya" target="_blank">إنستغرام</a>
    </div>

    <!-- رابط العودة -->
    <a href="../index.html" class="back">← العودة إلى الإبداعات</a>
  </div>
</body>
</html>
